[workspace]
name = "livefreeze"
version = "0.2.0"
description = "PySide6 + OpenCV 桌面视频预览"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = "3.11"

[pypi-dependencies]
PySide6 = ">=6.6.0"
opencv-python = ">=4.8.0"
numpy = ">=1.24.0"
pyusb = ">=1.2.0"
PyYAML = ">=6.0"
matplotlib = ">=3.8.0"
pyinstaller = ">=6.0"

[tasks]
run = "python main.py"
build = "pyinstaller --noconfirm --clean livefreeze.spec"
